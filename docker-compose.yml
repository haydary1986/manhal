# منهل — تشغيل كامل: البوت + Postgres (تخزين دائم) + Ollama (embeddings محلية).
# الاستخدام:
#   1) cp .env.example .env  ثم املأ الأسرار (BOT_TOKEN, DEEPSEEK_API_KEY, ADMIN_WEB_TOKEN, EMBED_MODEL=bge-m3 ...)
#   2) docker compose up -d --build
#   3) docker compose exec ollama ollama pull bge-m3   # تنزيل نموذج التضمين مرة واحدة
#
# ملاحظة: DATABASE_URL و OLLAMA_URL تُضبَطان هنا تلقائياً للخدمات الداخلية —
#         لا تضعهما في .env (ستُتجاهَل قيمتهما لصالح ما أدناه).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: manhal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: manhal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manhal -d manhal"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped
    # تفعيل GPU (اختياري إن توفّر):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - { driver: nvidia, count: all, capabilities: [gpu] }

  # تنزيل نموذج التضمين مرّة واحدة تلقائياً (يكتمل خلال دقائق؛ البحث الدلالي/PDF
  # يصبح جاهزاً بعد اكتماله). يخرج بنجاح بعد السحب.
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_started
    environment:
      OLLAMA_HOST: ollama:11434
    entrypoint: ["/bin/sh", "-c", "sleep 4; ollama pull ${EMBED_MODEL:-bge-m3}"]
    restart: "no"

  bot:
    build: .
    # المتغيّرات تُقرأ من خزنة Coolify (Environment Variables) — أو محليّاً من ./.env
    # عبر استبدال ${...}. لا نستخدم env_file كي لا يفشل النشر حين غياب .env على الخادم.
    environment:
      # خدمات داخلية — تُضبَط تلقائياً، لا تضعها في الخزنة:
      DATABASE_URL: postgres://manhal:${POSTGRES_PASSWORD:-changeme}@postgres:5432/manhal?sslmode=disable
      OLLAMA_URL: http://ollama:11434
      # أسرار/إعدادات — املأها في Coolify (أو ./.env محليّاً):
      BOT_TOKEN: ${BOT_TOKEN:-}
      ADMIN_IDS: ${ADMIN_IDS:-}
      ADMIN_WEB_TOKEN: ${ADMIN_WEB_TOKEN:-}
      ADMIN_WEB_USERS: ${ADMIN_WEB_USERS:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      EMBED_MODEL: ${EMBED_MODEL:-bge-m3}
      UNPAYWALL_EMAIL: ${UNPAYWALL_EMAIL:-}
      CROSSREF_MAILTO: ${CROSSREF_MAILTO:-}
      AI_DAILY_LIMIT: ${AI_DAILY_LIMIT:-}
      ALERT_INTERVAL_MINUTES: ${ALERT_INTERVAL_MINUTES:-}
      REMINDER_WINDOW_DAYS: ${REMINDER_WINDOW_DAYS:-}
      DIGEST_WEEKDAY: ${DIGEST_WEEKDAY:-}
      WEB_ADDR: ${WEB_ADDR:-:8080}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    ports:
      - "8080:8080" # لوحة الأدمن — في Coolify اربط نطاقاً بدل تعريض المنفذ
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  pgdata:
  ollama:
